version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: postgresForBanking
    ports:
      - "127.0.0.1:7000:5432"
    environment:
      POSTGRES_PASSWORD: abc123
      POSTGRES_USER: hau
      POSTGRES_DB: news
    command: >
      postgres -c shared_preload_libraries='pg_stat_statements'
    networks:
      - app-network

networks:
  app-network:
    driver: bridge